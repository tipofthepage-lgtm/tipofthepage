<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks! — Tip of the Page</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .thanks-card {
    max-width: 560px;
    margin: 0 auto;
    text-align: center;
  }
  .thanks-card .card {
    padding: 52px 48px;
  }
  .thanks-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }
  .thanks-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .thanks-body {
    font-size: 1rem;
    color: var(--ink-light);
    font-style: italic;
    line-height: 1.8;
    margin-bottom: 28px;
  }
  .book-credit {
    display: inline-block;
    background: var(--paper-dark);
    border: 1px solid var(--paper-darker);
    border-radius: 2px;
    padding: 10px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--ink);
    margin-bottom: 32px;
    box-shadow: 2px 2px 0 var(--paper-darker);
  }
  .fuzzy-warning {
    background: rgba(184,134,11,0.1);
    border-left: 3px solid var(--gold);
    padding: 12px 16px;
    border-radius: 1px;
    font-size: 0.88rem;
    color: #7a5c00;
    font-style: italic;
    margin-bottom: 28px;
    text-align: left;
  }
  .thanks-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
</head>
<body>
<header>
  <h1>Tip of the Page</h1>
</header>

<div class="thanks-card">
  <div class="card">
    <span class="thanks-icon">🎉</span>
    <p class="thanks-title">Thanks for the submission!</p>

    <div class="book-credit">
      "{{ title }}" by {{ author }}
    </div>

    {% if fuzzy_warning %}
    <div class="fuzzy-warning">⚠ {{ fuzzy_warning }}</div>
    {% endif %}

    <p class="thanks-body">
      Your quote has been received and we'll review it shortly.
      A confirmation has been sent to your email address.
      Thank you!
    </p>

    <div class="thanks-actions">
      <a href="{{ url_for('index') }}" class="btn btn-primary">Play the Game</a>
      <a href="{{ url_for('submit_page') }}" class="btn btn-secondary">Submit Another</a>
    </div>
  </div>
</div>

</body>
</html>
