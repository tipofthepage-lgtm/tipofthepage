<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Quotes — Tip of the Page</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
  <h1>📖 Tip of the Page</h1>
</header>
<div class="card" style="max-width:520px; margin:0 auto; text-align:center; padding:52px 40px;">
  <p style="font-size:2.5rem; margin-bottom:16px;">📭</p>
  <p class="game-over-title" style="color:var(--ink-light); font-size:1.4rem;">
    {% if genre %}No quotes found for "{{ genre }}"{% else %}No quotes in the database yet{% endif %}
  </p>
  <p style="margin:16px 0 28px; font-style:italic; color:var(--ink-faint);">
    {% if genre %}Try a different genre, or play with all genres.{% else %}Add some quotes using the Quote Manager to get started.{% endif %}
  </p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">← Back</a>
</div>
</body>
</html>
